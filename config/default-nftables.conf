# Agora OS nftables layout
#
# The isolation-service bootstraps this structure at startup via
# BootstrapNftables(). This file is documentation, not loaded at runtime.
#
# All per-agent rules live in agent-os-output so we can flush it cleanly
# without disturbing the host's existing nft configuration.

table inet filter {
    chain output {
        type filter hook output priority 0; policy accept;
        jump agent-os-output
    }

    chain agent-os-output {
        # Per-agent rules are added/removed here at runtime.
        # Examples (added by applyNetRules):
        #   meta skuid 60000 drop                     # NetDeny
        #   meta skuid 60001 oif != "lo" drop          # NetLocalOnly
        #   (no rule)                                  # NetAllow
    }
}
