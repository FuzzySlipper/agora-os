# Agora OS Wayfire session config for den-k8plus.
# Installed for the agent user at /home/agent/.config/wayfire.ini.
# Based on /usr/share/doc/wayfire/wayfire.ini with only the minimal
# agent-WM plugins enabled plus the Agora compositor bridge plugin.

[core]
plugins = \
  autostart \
  command \
  foreign-toplevel \
  gtk-shell \
  place \
  move \
  resize \
  wm-actions \
  window-rules \
  agora-bridge

# Keep a small workspace grid for agent-launched windows without desktop effects.
vwidth = 2
vheight = 2
preferred_decoration_mode = client

[input]
xkb_layout = us

# Current den-k8plus physical monitor discovered from kscreen/sysfs:
#   HDMI-A-1 connected, preferred 2560x1440@59.95, high-refresh mode available.
# If the monitor wiring changes, remove or rename this section; Wayfire will
# otherwise auto-detect connected outputs when no explicit output section exists.
[output:HDMI-A-1]
mode = 2560x1440@59950
position = 0,0
transform = normal
scale = 1.000000

[agora-bridge]
socket_path = /run/agent-os/compositor-bridge.sock
emit_input_denied = true

[autostart]
# No wf-shell/panel/background: this is an agent compositor, not a human desktop.
autostart_wf_shell = false
0_env = dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XAUTHORITY XDG_CURRENT_DESKTOP

[command]
binding_terminal = <super> KEY_ENTER
command_terminal = alacritty

[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[wm-actions]
toggle_fullscreen = <super> KEY_F
